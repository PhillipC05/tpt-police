name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/tpt-test"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tpt-police/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: tpt-police

      - name: Lint
        run: npm run lint
        working-directory: tpt-police

      - name: Type check
        run: npx tsc --noEmit
        working-directory: tpt-police

  test:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tpt-police/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: tpt-police

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: tpt-police

      - name: Build
        run: npm run build
        working-directory: tpt-police

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: tpt-police
          file: tpt-police/Dockerfile
          push: false
          tags: tpt-police:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max